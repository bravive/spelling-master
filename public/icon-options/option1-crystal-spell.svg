<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1a1145"/>
    </linearGradient>
    <linearGradient id="crystal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="crystal1b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="glow1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="softglow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerglow1">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg1)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#c4b5fd" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/><line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/><line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/><line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Central crystal -->
  <polygon points="256,68 340,200 340,340 256,420 172,340 172,200" fill="url(#crystal1)" filter="url(#softglow1)"/>
  <!-- Crystal facets -->
  <polygon points="256,68 340,200 256,230" fill="url(#crystal1b)"/>
  <polygon points="256,68 172,200 256,230" fill="#7c3aed" opacity="0.5"/>
  <polygon points="256,230 340,200 340,340 256,370" fill="#6d28d9" opacity="0.3"/>
  <polygon points="256,230 172,200 172,340 256,370" fill="#5b21b6" opacity="0.4"/>
  <polygon points="256,420 340,340 256,370" fill="#4c1d95" opacity="0.6"/>
  <polygon points="256,420 172,340 256,370" fill="#3b0764" opacity="0.5"/>
  <!-- Inner glow -->
  <ellipse cx="256" cy="240" rx="40" ry="50" fill="#fbbf24" opacity="0.15" filter="url(#innerglow1)"/>
  <!-- "S" letter etched in crystal -->
  <text x="256" y="280" text-anchor="middle" font-family="Georgia,serif" font-size="120" font-weight="700" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.9">S</text>
  <text x="256" y="280" text-anchor="middle" font-family="Georgia,serif" font-size="120" font-weight="700" fill="#fbbf24" opacity="0.15">S</text>
  <!-- Orbiting particles -->
  <circle cx="130" cy="150" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="382" cy="150" r="4" fill="#f472b6" opacity="0.7"/>
  <circle cx="400" cy="350" r="3.5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="112" cy="360" r="4.5" fill="#10b981" opacity="0.7"/>
  <!-- Light rays from crystal -->
  <line x1="256" y1="68" x2="200" y2="40" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="68" x2="310" y2="35" stroke="#fbbf24" stroke-width="1" opacity="0.25"/>
  <line x1="256" y1="68" x2="256" y2="30" stroke="#fbbf24" stroke-width="2" opacity="0.35"/>
  <!-- Bottom text -->
  <text x="256" y="475" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#c4b5fd" letter-spacing="12" opacity="0.6">SPELL</text>
</svg>
