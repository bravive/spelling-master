<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0618"/>
      <stop offset="100%" stop-color="#1a0f3c"/>
    </linearGradient>
    <filter id="neon2p">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon2y">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon2b">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg2)"/>
  <!-- Scanlines -->
  <g opacity="0.05">
    <rect y="0" width="512" height="2" fill="#fff"/><rect y="4" width="512" height="2" fill="#fff"/>
    <rect y="8" width="512" height="2" fill="#fff"/><rect y="12" width="512" height="2" fill="#fff"/>
    <rect y="16" width="512" height="2" fill="#fff"/><rect y="20" width="512" height="2" fill="#fff"/>
    <rect y="24" width="512" height="2" fill="#fff"/><rect y="28" width="512" height="2" fill="#fff"/>
    <rect y="100" width="512" height="2" fill="#fff"/><rect y="104" width="512" height="2" fill="#fff"/>
    <rect y="200" width="512" height="2" fill="#fff"/><rect y="204" width="512" height="2" fill="#fff"/>
    <rect y="300" width="512" height="2" fill="#fff"/><rect y="304" width="512" height="2" fill="#fff"/>
    <rect y="400" width="512" height="2" fill="#fff"/><rect y="404" width="512" height="2" fill="#fff"/>
    <rect y="500" width="512" height="2" fill="#fff"/><rect y="504" width="512" height="2" fill="#fff"/>
  </g>
  <!-- Neon border frame -->
  <rect x="50" y="50" width="412" height="412" rx="24" fill="none" stroke="#f472b6" stroke-width="2.5" opacity="0.5" filter="url(#neon2p)"/>
  <rect x="65" y="65" width="382" height="382" rx="18" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
  <!-- Big neon S -->
  <text x="256" y="310" text-anchor="middle" font-family="'Courier New',monospace" font-size="220" font-weight="900" fill="#fbbf24" filter="url(#neon2y)" opacity="0.95">S</text>
  <!-- "SPELL" neon sign top -->
  <text x="256" y="128" text-anchor="middle" font-family="'Courier New',monospace" font-size="44" font-weight="700" fill="#f472b6" filter="url(#neon2p)" letter-spacing="16">SPELL</text>
  <!-- "MASTER" neon sign bottom -->
  <text x="256" y="405" text-anchor="middle" font-family="'Courier New',monospace" font-size="36" font-weight="700" fill="#60a5fa" filter="url(#neon2b)" letter-spacing="12">MASTER</text>
  <!-- Star decorations -->
  <text x="85" y="135" font-family="'Courier New',monospace" font-size="20" fill="#fbbf24" opacity="0.7" filter="url(#neon2y)">*</text>
  <text x="415" y="135" font-family="'Courier New',monospace" font-size="20" fill="#fbbf24" opacity="0.7" filter="url(#neon2y)">*</text>
  <text x="85" y="410" font-family="'Courier New',monospace" font-size="20" fill="#10b981" opacity="0.6">*</text>
  <text x="415" y="410" font-family="'Courier New',monospace" font-size="20" fill="#10b981" opacity="0.6">*</text>
</svg>
