<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#110d2e"/>
      <stop offset="100%" stop-color="#1e1650"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg3)"/>
  <!-- Stacked books — bottom book (blue) -->
  <g filter="url(#shadow3)">
    <rect x="100" y="320" width="312" height="52" rx="6" fill="#3b82f6" transform="rotate(-3,256,346)"/>
    <rect x="100" y="320" width="16" height="52" rx="3" fill="#2563eb" transform="rotate(-3,256,346)"/>
    <rect x="170" y="330" width="80" height="6" rx="3" fill="#93c5fd" opacity="0.5" transform="rotate(-3,256,346)"/>
  </g>
  <!-- Middle book (pink) -->
  <g filter="url(#shadow3)">
    <rect x="90" y="268" width="332" height="52" rx="6" fill="#ec4899" transform="rotate(2,256,294)"/>
    <rect x="90" y="268" width="16" height="52" rx="3" fill="#db2777" transform="rotate(2,256,294)"/>
    <rect x="160" y="280" width="100" height="6" rx="3" fill="#fbcfe8" opacity="0.5" transform="rotate(2,256,294)"/>
  </g>
  <!-- Top book (golden — the magic spellbook, open) -->
  <g filter="url(#shadow3)">
    <!-- Left page -->
    <path d="M115 120 C115 115,120 112,125 112 L250 112 L250 265 L125 265 C120 265,115 262,115 257Z" fill="#fef3c7"/>
    <!-- Right page -->
    <path d="M397 120 C397 115,392 112,387 112 L262 112 L262 265 L387 265 C392 265,397 262,397 257Z" fill="#fde68a"/>
    <!-- Spine shadow -->
    <rect x="248" y="112" width="16" height="153" fill="#d97706" opacity="0.3"/>
    <!-- Page lines left -->
    <rect x="138" y="140" width="85" height="4" rx="2" fill="#d97706" opacity="0.15"/>
    <rect x="138" y="155" width="70" height="4" rx="2" fill="#d97706" opacity="0.12"/>
    <rect x="138" y="170" width="78" height="4" rx="2" fill="#d97706" opacity="0.13"/>
    <rect x="138" y="185" width="60" height="4" rx="2" fill="#d97706" opacity="0.11"/>
    <!-- Page lines right -->
    <rect x="286" y="140" width="80" height="4" rx="2" fill="#d97706" opacity="0.15"/>
    <rect x="286" y="155" width="65" height="4" rx="2" fill="#d97706" opacity="0.12"/>
    <rect x="286" y="170" width="75" height="4" rx="2" fill="#d97706" opacity="0.13"/>
    <!-- Magic star rising from book -->
    <path d="M256 90 L264 110 L286 110 L268 122 L276 144 L256 132 L236 144 L244 122 L226 110 L248 110Z" fill="#fbbf24"/>
  </g>
  <!-- Floating sparkle particles -->
  <circle cx="200" cy="80" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="310" cy="70" r="2.5" fill="#f472b6" opacity="0.7"/>
  <circle cx="170" cy="60" r="2" fill="#60a5fa" opacity="0.6"/>
  <circle cx="340" cy="85" r="2" fill="#10b981" opacity="0.5"/>
  <circle cx="256" cy="55" r="3.5" fill="#c4b5fd" opacity="0.6"/>
  <!-- Bottom label -->
  <text x="256" y="430" text-anchor="middle" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#fbbf24" letter-spacing="4" opacity="0.85">Spell</text>
  <text x="256" y="465" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="400" fill="#c4b5fd" letter-spacing="10" opacity="0.6">MASTER</text>
</svg>
