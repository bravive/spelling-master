<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <radialGradient id="eye4" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="50%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </radialGradient>
    <filter id="owlshadow4">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg4)"/>
  <!-- Stars background -->
  <circle cx="80" cy="80" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="430" cy="60" r="1.5" fill="#fff" opacity="0.25"/>
  <circle cx="50" cy="200" r="1.5" fill="#fff" opacity="0.2"/>
  <circle cx="460" cy="180" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="100" cy="420" r="1.5" fill="#fff" opacity="0.2"/>
  <circle cx="420" cy="400" r="1" fill="#fff" opacity="0.25"/>
  <circle cx="380" cy="100" r="1" fill="#fff" opacity="0.2"/>
  <!-- Owl body -->
  <g filter="url(#owlshadow4)">
    <!-- Body -->
    <ellipse cx="256" cy="310" rx="120" ry="100" fill="#7c3aed"/>
    <!-- Chest pattern -->
    <ellipse cx="256" cy="330" rx="70" ry="65" fill="#a78bfa" opacity="0.5"/>
    <ellipse cx="256" cy="340" rx="50" ry="50" fill="#c4b5fd" opacity="0.3"/>
    <!-- Head -->
    <circle cx="256" cy="200" r="95" fill="#8b5cf6"/>
    <!-- Ear tufts -->
    <polygon points="185,140 165,80 210,130" fill="#7c3aed"/>
    <polygon points="327,140 347,80 302,130" fill="#7c3aed"/>
    <!-- Inner ear -->
    <polygon points="190,135 178,95 208,128" fill="#a78bfa" opacity="0.5"/>
    <polygon points="322,135 334,95 304,128" fill="#a78bfa" opacity="0.5"/>
    <!-- Eye sockets -->
    <circle cx="215" cy="195" r="38" fill="#1e1b4b"/>
    <circle cx="297" cy="195" r="38" fill="#1e1b4b"/>
    <!-- Eyes -->
    <circle cx="215" cy="195" r="30" fill="url(#eye4)"/>
    <circle cx="297" cy="195" r="30" fill="url(#eye4)"/>
    <!-- Pupils -->
    <circle cx="222" cy="190" r="14" fill="#1e1b4b"/>
    <circle cx="304" cy="190" r="14" fill="#1e1b4b"/>
    <!-- Eye highlights -->
    <circle cx="228" cy="184" r="5" fill="#fff" opacity="0.9"/>
    <circle cx="310" cy="184" r="5" fill="#fff" opacity="0.9"/>
    <circle cx="218" cy="196" r="2.5" fill="#fff" opacity="0.5"/>
    <circle cx="300" cy="196" r="2.5" fill="#fff" opacity="0.5"/>
    <!-- Beak -->
    <polygon points="256,218 245,238 267,238" fill="#fbbf24"/>
    <polygon points="256,218 245,238 256,232" fill="#f59e0b" opacity="0.5"/>
    <!-- Feet -->
    <ellipse cx="220" cy="405" rx="25" ry="10" fill="#fbbf24" opacity="0.8"/>
    <ellipse cx="292" cy="405" rx="25" ry="10" fill="#fbbf24" opacity="0.8"/>
  </g>
  <!-- Graduation cap on head -->
  <polygon points="256,108 340,148 256,138 172,148" fill="#1e1b4b"/>
  <rect x="230" y="100" width="52" height="12" rx="2" fill="#1e1b4b"/>
  <!-- Tassel -->
  <line x1="340" y1="148" x2="355" y2="180" stroke="#fbbf24" stroke-width="2.5"/>
  <circle cx="355" cy="183" r="5" fill="#fbbf24"/>
  <!-- "SM" on chest -->
  <text x="256" y="355" text-anchor="middle" font-family="Georgia,serif" font-size="32" font-weight="900" fill="#fbbf24" opacity="0.8">SM</text>
  <!-- Bottom text -->
  <text x="256" y="470" text-anchor="middle" font-family="Georgia,serif" font-size="24" font-weight="700" fill="#c4b5fd" letter-spacing="6" opacity="0.5">SPELL MASTER</text>
</svg>
