<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1e1650"/>
    </linearGradient>
    <linearGradient id="gold7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gold7b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="sealglow7">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg7)"/>
  <!-- Starburst seal shape -->
  <g filter="url(#sealglow7)">
    <polygon points="256,65 275,120 295,72 300,128 332,88 322,144 362,114 338,162 384,146 348,182 400,180 356,204 406,216 358,226 398,252 350,248 380,286 336,268 354,316 316,286 320,338 292,300 282,354 266,310 244,356 240,304 216,344 224,296 188,326 208,280 168,296 200,256 154,260 198,234 150,224 200,212 160,190 208,194 178,162 220,176 204,136 238,160 236,118 256,154 276,118 256,65" fill="url(#gold7)" opacity="0.9"/>
  </g>
  <!-- Inner circle -->
  <circle cx="256" cy="216" r="110" fill="#1e1b4b"/>
  <circle cx="256" cy="216" r="100" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="216" r="93" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  <!-- Centered S -->
  <text x="256" y="255" text-anchor="middle" font-family="Georgia,serif" font-size="130" font-weight="700" fill="url(#gold7b)">S</text>
  <!-- Small stars around -->
  <text x="185" y="155" font-family="Georgia,serif" font-size="16" fill="#fbbf24" opacity="0.6">&#9733;</text>
  <text x="320" y="155" font-family="Georgia,serif" font-size="16" fill="#fbbf24" opacity="0.6">&#9733;</text>
  <text x="185" y="290" font-family="Georgia,serif" font-size="14" fill="#fbbf24" opacity="0.5">&#9733;</text>
  <text x="320" y="290" font-family="Georgia,serif" font-size="14" fill="#fbbf24" opacity="0.5">&#9733;</text>
  <!-- Ribbon tails -->
  <polygon points="200,340 180,440 220,400 260,450 240,340" fill="#f472b6" opacity="0.8"/>
  <polygon points="312,340 332,440 292,400 252,450 272,340" fill="#60a5fa" opacity="0.8"/>
  <!-- SPELL MASTER on ribbon -->
  <text x="210" y="405" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#fff" opacity="0.9" transform="rotate(-8,210,405)">SPELL</text>
  <text x="302" y="405" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#fff" opacity="0.9" transform="rotate(8,302,405)">MASTER</text>
