    <rect x="256" y="224" width="32" height="32"/><rect x="256" y="256" width="32" height="32"/>
    <rect x="256" y="288" width="32" height="32"/><rect x="256" y="320" width="32" height="32"/>
    <rect x="288" y="160" width="32" height="32"/><rect x="288" y="192" width="32" height="32"/>
    <rect x="288" y="224" width="32" height="32"/><rect x="288" y="256" width="32" height="32"/>
    <rect x="288" y="288" width="32" height="32"/><rect x="288" y="320" width="32" height="32"/>
    <rect x="320" y="160" width="32" height="32"/><rect x="320" y="192" width="32" height="32"/>
    <rect x="320" y="224" width="32" height="32"/><rect x="320" y="256" width="32" height="32"/>
    <rect x="320" y="288" width="32" height="32"/><rect x="320" y="320" width="32" height="32"/>
    <rect x="352" y="192" width="32" height="32"/><rect x="352" y="224" width="32" height="32"/>
    <rect x="352" y="256" width="32" height="32"/><rect x="352" y="288" width="32" height="32"/>
  </g>
  <!-- Spine -->
  <rect x="240" y="160" width="32" height="192" fill="#6d28d9"/>
  <!-- Pixel text lines on pages -->
  <g fill="#c4b5fd" opacity="0.4">
    <rect x="168" y="200" width="48" height="4"/><rect x="168" y="214" width="36" height="4"/>
    <rect x="168" y="228" width="44" height="4"/><rect x="168" y="242" width="32" height="4"/>
    <rect x="270" y="200" width="44" height="4"/><rect x="270" y="214" width="38" height="4"/>
    <rect x="270" y="228" width="46" height="4"/><rect x="270" y="242" width="30" height="4"/>
  </g>
  <!-- Pixel star above book -->
  <g fill="#fbbf24">
    <rect x="240" y="96" width="32" height="32"/>
    <rect x="208" y="112" width="32" height="16"/><rect x="272" y="112" width="32" height="16"/>
    <rect x="240" y="128" width="32" height="16"/>
    <rect x="224" y="80" width="16" height="16"/><rect x="272" y="80" width="16" height="16"/>
  </g>
