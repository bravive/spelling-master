  <rect x="360" y="100" width="8" height="8" fill="#60a5fa"/>
  <rect x="120" y="350" width="8" height="8" fill="#10b981"/>
  <rect x="384" y="340" width="8" height="8" fill="#fbbf24"/>
  <!-- Bottom pixel text "SPELL" -->
  <text x="256" y="420" text-anchor="middle" font-family="'Courier New',monospace" font-size="48" font-weight="900" fill="#fbbf24" letter-spacing="8">SPELL</text>
  <text x="256" y="460" text-anchor="middle" font-family="'Courier New',monospace" font-size="24" font-weight="700" fill="#c4b5fd" letter-spacing="10" opacity="0.6">MASTER</text>
