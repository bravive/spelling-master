<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg8)"/>
  <!-- Pixel grid overlay -->
  <g opacity="0.03">
    <rect x="0" y="0" width="512" height="512" fill="url(#bg8)"/>
  </g>
  <!-- Pixel art open book -->
  <!-- Book base pixels (32px grid) -->
  <g fill="#8b5cf6">
    <!-- Left cover -->
    <rect x="96" y="192" width="32" height="32"/><rect x="96" y="224" width="32" height="32"/>
    <rect x="96" y="256" width="32" height="32"/><rect x="96" y="288" width="32" height="32"/>
    <rect x="128" y="160" width="32" height="32"/><rect x="128" y="320" width="32" height="32"/>
    <!-- Right cover -->
    <rect x="384" y="192" width="32" height="32"/><rect x="384" y="224" width="32" height="32"/>
    <rect x="384" y="256" width="32" height="32"/><rect x="384" y="288" width="32" height="32"/>
    <rect x="352" y="160" width="32" height="32"/><rect x="352" y="320" width="32" height="32"/>
  </g>
  <!-- Left page (white pixels) -->
  <g fill="#e2e8f0">
    <rect x="128" y="192" width="32" height="32"/><rect x="128" y="224" width="32" height="32"/>
    <rect x="128" y="256" width="32" height="32"/><rect x="128" y="288" width="32" height="32"/>
    <rect x="160" y="160" width="32" height="32"/><rect x="160" y="192" width="32" height="32"/>
    <rect x="160" y="224" width="32" height="32"/><rect x="160" y="256" width="32" height="32"/>
    <rect x="160" y="288" width="32" height="32"/><rect x="160" y="320" width="32" height="32"/>
    <rect x="192" y="160" width="32" height="32"/><rect x="192" y="192" width="32" height="32"/>
    <rect x="192" y="224" width="32" height="32"/><rect x="192" y="256" width="32" height="32"/>
    <rect x="192" y="288" width="32" height="32"/><rect x="192" y="320" width="32" height="32"/>
    <rect x="224" y="160" width="32" height="32"/><rect x="224" y="192" width="32" height="32"/>
    <rect x="224" y="224" width="32" height="32"/><rect x="224" y="256" width="32" height="32"/>
    <rect x="224" y="288" width="32" height="32"/><rect x="224" y="320" width="32" height="32"/>
  </g>
  <!-- Right page -->
  <g fill="#f8fafc">
