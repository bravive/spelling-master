<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1a1145"/>
    </linearGradient>
    <linearGradient id="ring9a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ring9b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="ring9c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="letterglow9">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringglow9">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg9)"/>
  <!-- Concentric magic circles -->
  <g filter="url(#ringglow9)">
    <circle cx="256" cy="240" r="190" fill="none" stroke="url(#ring9a)" stroke-width="2" opacity="0.25" stroke-dasharray="8 6"/>
    <circle cx="256" cy="240" r="160" fill="none" stroke="url(#ring9b)" stroke-width="1.5" opacity="0.2" stroke-dasharray="4 8"/>
    <circle cx="256" cy="240" r="130" fill="none" stroke="url(#ring9c)" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Arcane symbols on outer ring -->
  <g font-family="Georgia,serif" font-size="14" fill="#fbbf24" opacity="0.25">
    <text x="256" y="55" text-anchor="middle">&#9733;</text>
    <text x="430" y="245" text-anchor="middle">&#9733;</text>
    <text x="256" y="435" text-anchor="middle">&#9733;</text>
    <text x="82" y="245" text-anchor="middle">&#9733;</text>
    <text x="380" y="110" text-anchor="middle">&#10022;</text>
    <text x="380" y="375" text-anchor="middle">&#10022;</text>
    <text x="132" y="375" text-anchor="middle">&#10022;</text>
    <text x="132" y="110" text-anchor="middle">&#10022;</text>
  </g>
  <!-- Central glowing S -->
  <g filter="url(#letterglow9)">
    <text x="256" y="295" text-anchor="middle" font-family="Georgia,serif" font-size="200" font-weight="700" fill="#fbbf24" opacity="0.15">S</text>
  </g>
  <text x="256" y="295" text-anchor="middle" font-family="Georgia,serif" font-size="200" font-weight="700" fill="#fbbf24" opacity="0.9">S</text>
  <!-- Floating rune-letters around -->
  <text x="160" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#f472b6" opacity="0.7">p</text>
  <text x="352" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#60a5fa" opacity="0.7">e</text>
  <text x="130" y="290" text-anchor="middle" font-family="Georgia,serif" font-size="26" font-weight="700" fill="#10b981" opacity="0.6">l</text>
  <text x="382" y="290" text-anchor="middle" font-family="Georgia,serif" font-size="26" font-weight="700" fill="#c4b5fd" opacity="0.6">l</text>
  <!-- Sparkle accents -->
  <circle cx="195" cy="170" r="2" fill="#f472b6" opacity="0.5"/>
  <circle cx="317" cy="165" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="158" cy="310" r="2" fill="#10b981" opacity="0.4"/>
  <circle cx="354" cy="315" r="2" fill="#c4b5fd" opacity="0.4"/>
  <!-- Bottom -->
  <text x="256" y="470" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#c4b5fd" letter-spacing="10" opacity="0.4">MASTER</text>
</svg>
